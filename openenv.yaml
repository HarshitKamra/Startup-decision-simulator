version: "1.0"
name: startup-decision-simulator
description: Founder-agent benchmark for startup strategic decision-making under budget and churn constraints.
author: "Startup Sims Validation Team"
tags: ["startup-sim", "resource-allocation", "strategic-planning"]
entrypoint: env.environment:StartupDecisionEnv

models:
  observation: env.models:Observation
  action: env.models:Action
  reward: env.models:Reward

tasks:
  - id: support_turbulence
    difficulty: easy
    description: Improve sentiment and churn; grader rewards balanced support usage and low invalid penalties.
    grader: env.grader:grade_easy
    score_range: [0.0, 1.0]
  - id: pricing_pressure
    difficulty: medium
    description: Balanced profit, revenue, and retention; Pareto-style grader reduces one-axis gaming.
    grader: env.grader:grade_medium
    score_range: [0.0, 1.0]
  - id: runway_crisis
    difficulty: hard
    description: Survival with partial credit; runway, growth, and churn under tight cash.
    grader: env.grader:grade_hard
    score_range: [0.0, 1.0]
